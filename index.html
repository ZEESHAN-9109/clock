<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock">
    <img src="bg.png" class="face" alt="clock face">
    <div class="hand hour"></div>
    <div class="hand minute"></div>
    <div class="center-dot"></div>
    <div class="hand second"></div>
  </div>

</body>
</html>
